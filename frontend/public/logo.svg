<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Diamond shape with connected nodes -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0052a3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0096c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8c42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff7a3d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Connection lines -->
  <line x1="64" y1="24" x2="32" y2="64" stroke="#0066cc" stroke-width="2" opacity="0.6"/>
  <line x1="32" y1="64" x2="64" y2="104" stroke="#00b4d8" stroke-width="2" opacity="0.6"/>
  <line x1="64" y1="104" x2="96" y2="64" stroke="#ff8c42" stroke-width="2" opacity="0.6"/>
  <line x1="96" y1="64" x2="64" y2="24" stroke="#ff8c42" stroke-width="2" opacity="0.6"/>
  <line x1="32" y1="64" x2="96" y2="64" stroke="#00b4d8" stroke-width="2" opacity="0.6"/>
  
  <!-- Top node (dark blue) -->
  <circle cx="64" cy="24" r="10" fill="url(#blueGradient)" stroke="#0052a3" stroke-width="1"/>
  
  <!-- Left node (dark blue) -->
  <circle cx="32" cy="64" r="10" fill="url(#blueGradient)" stroke="#0052a3" stroke-width="1"/>
  
  <!-- Bottom node (teal) -->
  <circle cx="64" cy="104" r="10" fill="url(#tealGradient)" stroke="#0096c7" stroke-width="1"/>
  
  <!-- Right node (orange) -->
  <circle cx="96" cy="64" r="10" fill="url(#orangeGradient)" stroke="#ff7a3d" stroke-width="1"/>
  
  <!-- Center accent -->
  <circle cx="64" cy="64" r="3" fill="#0066cc" opacity="0.8"/>
</svg>